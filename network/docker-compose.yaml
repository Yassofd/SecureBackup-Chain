# ══════════════════════════════════════════════════════════════════════════════
# SERVICES PARTAGÉS
# ══════════════════════════════════════════════════════════════════════════════

  backup-cc:
    image: node:18-alpine
    container_name: backup-cc
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9999
      - CHAINCODE_ID=${CHAINCODE_ID:-backup-cc_1.0:placeholder}
    working_dir: /usr/local/src
    command: sh /usr/local/src/start.sh
    volumes:
      - ../chaincode:/usr/local/src
    depends_on:
      - peer0.org1.example.com
      - peer0.org2.example.com
      - peer0.org3.example.com
    networks:
      - fabric

volumes:
  orderer1-data:
  orderer2-data:
  orderer3-data:
  peer0-org1-data:
  peer0-org2-data:
  peer0-org3-data:
  ipfs0-data:
  ipfs1-data:
  ipfs2-data:

# Auto-generated — Nœud 2 (Org2) — mono-hôte Docker
networks:
  securebackup-net:
    external: true

services:

  orderer.org2.example.com:
    image: hyperledger/fabric-orderer:2.5.4
    container_name: orderer.org2.example.com
    hostname: orderer.org2.example.com
    restart: unless-stopped
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=8050
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_GENERAL_LOCALMSPID=Org2OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/cluster-ca-bundle.crt]
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED=true
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9443
    volumes:
      - /workspaces/SecureBackup-Chain/network/crypto-config/ordererOrganizations/org2.example.com/orderers/orderer.org2.example.com/msp:/var/hyperledger/orderer/msp:ro
      - /workspaces/SecureBackup-Chain/network/crypto-config/ordererOrganizations/org2.example.com/orderers/orderer.org2.example.com/tls:/var/hyperledger/orderer/tls:ro
      - /workspaces/SecureBackup-Chain/network/crypto-config/orderer-cluster-tls-ca-bundle.crt:/var/hyperledger/orderer/cluster-ca-bundle.crt:ro
      - orderer2-data:/var/hyperledger/production/orderer
    ports:
      - "8050:8050"
      - "8043:9443"
    networks:
      - securebackup-net

  ca.org2.example.com:
    image: hyperledger/fabric-ca:1.5.7
    container_name: ca.org2.example.com
    hostname: ca.org2.example.com
    restart: unless-stopped
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org2
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - /workspaces/SecureBackup-Chain/network/crypto-config/peerOrganizations/org2.example.com/ca/:/etc/hyperledger/fabric-ca-server-config:ro
    ports:
      - "8054:8054"
    networks:
      - securebackup-net

  couchdb1:
    image: couchdb:3.3
    container_name: couchdb1
    restart: unless-stopped
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "6984:5984"
    networks:
      - securebackup-net

  peer0.org2.example.com:
    image: hyperledger/fabric-peer:2.5.4
    container_name: peer0.org2.example.com
    hostname: peer0.org2.example.com
    restart: unless-stopped
    depends_on:
      - orderer.org2.example.com
      - couchdb1
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=securebackup-net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org2.example.com
      - CORE_PEER_ADDRESS=peer0.org2.example.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2.example.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.example.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.example.com:8051
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /workspaces/SecureBackup-Chain/network/crypto-config/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/msp:/etc/hyperledger/fabric/msp:ro
      - /workspaces/SecureBackup-Chain/network/crypto-config/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls:/etc/hyperledger/fabric/tls:ro
      - peer0-org2-data:/var/hyperledger/production
    ports:
      - "8051:8051"
    networks:
      - securebackup-net

  ipfs1:
    image: ipfs/kubo:latest
    container_name: ipfs1
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ipfs1-data:/data/ipfs
    ports:
      - "4002:4001"
      - "5002:5001"
      - "8081:8080"
    networks:
      - securebackup-net

  cluster1:
    image: ipfs/ipfs-cluster:latest
    container_name: cluster1
    restart: unless-stopped
    depends_on:
      - ipfs1
    environment:
      - CLUSTER_PEERNAME=cluster1
      - CLUSTER_SECRET=${CLUSTER_SECRET}
      - CLUSTER_IPFSHTTP_NODEMULTIADDRESS=/dns4/ipfs1/tcp/5001
      - CLUSTER_CRDT_TRUSTEDPEERS=*
      - CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS=/ip4/0.0.0.0/tcp/10094
      - CLUSTER_MONITORPINGINTERVAL=2s
    ports:
      - "10094:10094"
      - "10096:9096"
    volumes:
      - cluster1-data:/data/ipfs-cluster
    networks:
      - securebackup-net

volumes:
  orderer2-data:
  peer0-org2-data:
  ipfs1-data:
  cluster1-data:

# Auto-generated — Nœud 3 (Org3) — mono-hôte Docker
networks:
  securebackup-net:
    external: true

services:

  orderer.org3.example.com:
    image: hyperledger/fabric-orderer:2.5.4
    container_name: orderer.org3.example.com
    hostname: orderer.org3.example.com
    restart: unless-stopped
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=9050
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_GENERAL_LOCALMSPID=Org3OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/cluster-ca-bundle.crt]
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED=true
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9443
    volumes:
      - /workspaces/SecureBackup-Chain/network/crypto-config/ordererOrganizations/org3.example.com/orderers/orderer.org3.example.com/msp:/var/hyperledger/orderer/msp:ro
      - /workspaces/SecureBackup-Chain/network/crypto-config/ordererOrganizations/org3.example.com/orderers/orderer.org3.example.com/tls:/var/hyperledger/orderer/tls:ro
      - /workspaces/SecureBackup-Chain/network/crypto-config/orderer-cluster-tls-ca-bundle.crt:/var/hyperledger/orderer/cluster-ca-bundle.crt:ro
      - orderer3-data:/var/hyperledger/production/orderer
    ports:
      - "9050:9050"
      - "9043:9443"
    networks:
      - securebackup-net

  ca.org3.example.com:
    image: hyperledger/fabric-ca:1.5.7
    container_name: ca.org3.example.com
    hostname: ca.org3.example.com
    restart: unless-stopped
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org3
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - /workspaces/SecureBackup-Chain/network/crypto-config/peerOrganizations/org3.example.com/ca/:/etc/hyperledger/fabric-ca-server-config:ro
    ports:
      - "9054:9054"
    networks:
      - securebackup-net

  couchdb2:
    image: couchdb:3.3
    container_name: couchdb2
    restart: unless-stopped
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    networks:
      - securebackup-net

  peer0.org3.example.com:
    image: hyperledger/fabric-peer:2.5.4
    container_name: peer0.org3.example.com
    hostname: peer0.org3.example.com
    restart: unless-stopped
    depends_on:
      - orderer.org3.example.com
      - couchdb2
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=securebackup-net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org3.example.com
      - CORE_PEER_ADDRESS=peer0.org3.example.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org3.example.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org3.example.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org3.example.com:9051
      - CORE_PEER_LOCALMSPID=Org3MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb2:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /workspaces/SecureBackup-Chain/network/crypto-config/peerOrganizations/org3.example.com/peers/peer0.org3.example.com/msp:/etc/hyperledger/fabric/msp:ro
      - /workspaces/SecureBackup-Chain/network/crypto-config/peerOrganizations/org3.example.com/peers/peer0.org3.example.com/tls:/etc/hyperledger/fabric/tls:ro
      - peer0-org3-data:/var/hyperledger/production
    ports:
      - "9051:9051"
    networks:
      - securebackup-net

  ipfs2:
    image: ipfs/kubo:latest
    container_name: ipfs2
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ipfs2-data:/data/ipfs
    ports:
      - "4003:4001"
      - "5003:5001"
      - "8082:8080"
    networks:
      - securebackup-net

  cluster2:
    image: ipfs/ipfs-cluster:latest
    container_name: cluster2
    restart: unless-stopped
    depends_on:
      - ipfs2
    environment:
      - CLUSTER_PEERNAME=cluster2
      - CLUSTER_SECRET=${CLUSTER_SECRET}
      - CLUSTER_IPFSHTTP_NODEMULTIADDRESS=/dns4/ipfs2/tcp/5001
      - CLUSTER_CRDT_TRUSTEDPEERS=*
      - CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS=/ip4/0.0.0.0/tcp/11094
      - CLUSTER_MONITORPINGINTERVAL=2s
    ports:
      - "11094:11094"
      - "11096:9096"
    volumes:
      - cluster2-data:/data/ipfs-cluster
    networks:
      - securebackup-net

volumes:
  orderer3-data:
  peer0-org3-data:
  ipfs2-data:
  cluster2-data:

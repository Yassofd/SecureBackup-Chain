services:
  db:
    image: postgres:16-alpine
    container_name: securebackup-db
    environment:
      POSTGRES_DB: securebackup
      POSTGRES_USER: securebackup
      POSTGRES_PASSWORD: securebackuppw
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securebackup"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:

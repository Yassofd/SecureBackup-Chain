version: '3.8'

networks:
  fabric:
    name: securebackup-fabric
    external: true

services:
  ipfs0:
    image: ipfs/kubo:latest
    container_name: ipfs0
    environment:
      - IPFS_PROFILE=server
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs0-data:/data/ipfs
      - ipfs0-staging:/export
    networks:
      - fabric

volumes:
  ipfs0-data:
  ipfs0-staging:

# ══════════════════════════════════════════════════════════════════════════════
# SecureBackup-Chain — Déploiement production (all-in-one)
# Lancé par install.sh — ne pas modifier manuellement.
# ══════════════════════════════════════════════════════════════════════════════

networks:
  securebackup:
    name: securebackup-fabric   # même nom que le réseau attendu par le peer

volumes:
  db-data:
  orderer1-data:
  peer0-org1-data:
  couchdb0-data:
  ipfs0-data:
  cluster0-data:
  backend-wallet:
  backend-logs:
  snapshots:

x-fabric-hosts: &fabric-hosts
  extra_hosts:
    - "orderer.org2.example.com:127.0.0.1"
    - "peer0.org2.example.com:127.0.0.1"
    - "orderer.org3.example.com:127.0.0.1"
    - "peer0.org3.example.com:127.0.0.1"

services:

  # ── Base de données ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: securebackup-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: securebackup
      POSTGRES_USER: ${DB_USER:-securebackup}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - securebackup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-securebackup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── IPFS ────────────────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs0
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ipfs0-data:/data/ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    networks:
      - securebackup
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── IPFS Cluster ────────────────────────────────────────────────────────────
  ipfs-cluster:
    image: ipfs/ipfs-cluster:latest
    container_name: cluster0
    restart: unless-stopped
    depends_on:
      ipfs:
        condition: service_healthy
    environment:
      - CLUSTER_PEERNAME=cluster0
      - CLUSTER_SECRET=${CLUSTER_SECRET}
      - CLUSTER_IPFSHTTP_NODEMULTIADDRESS=/dns4/ipfs/tcp/5001
      - CLUSTER_CRDT_TRUSTEDPEERS=*
      - CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS=/ip4/0.0.0.0/tcp/9094
      - CLUSTER_MONITORPINGINTERVAL=2s
    volumes:
      - cluster0-data:/data/ipfs-cluster
    ports:
      - "9094:9094"
    networks:
      - securebackup

  # ── CouchDB (state database du peer) ────────────────────────────────────────
  couchdb:
    image: couchdb:3.3
    container_name: couchdb0
    restart: unless-stopped
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    volumes:
      - couchdb0-data:/opt/couchdb/data
    networks:
      - securebackup

  # ── Fabric Orderer ──────────────────────────────────────────────────────────
  orderer:
    image: hyperledger/fabric-orderer:2.5.4
    container_name: orderer.org1.example.com
    hostname: orderer.org1.example.com
    restart: unless-stopped
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=Org1OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    volumes:
      - ./network/channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block:ro
      - ./network/crypto-config/ordererOrganizations/org1.example.com/orderers/orderer.org1.example.com/msp:/var/hyperledger/orderer/msp:ro
      - ./network/crypto-config/ordererOrganizations/org1.example.com/orderers/orderer.org1.example.com/tls:/var/hyperledger/orderer/tls:ro
      - orderer1-data:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    <<: *fabric-hosts
    networks:
      - securebackup

  # ── Fabric CA ───────────────────────────────────────────────────────────────
  ca:
    image: hyperledger/fabric-ca:1.5.7
    container_name: ca.org1.example.com
    hostname: ca.org1.example.com
    restart: unless-stopped
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_TLS_CERTFILE=/etc/hyperledger/fabric-ca-server/tls/ca.crt
      - FABRIC_CA_SERVER_TLS_KEYFILE=/etc/hyperledger/fabric-ca-server/tls/ca.key
    volumes:
      - ./network/crypto-config/peerOrganizations/org1.example.com/ca:/etc/hyperledger/fabric-ca-server/tls:ro
    ports:
      - "7054:7054"
    networks:
      - securebackup

  # ── Fabric Peer ─────────────────────────────────────────────────────────────
  peer:
    image: hyperledger/fabric-peer:2.5.4
    container_name: peer0.org1.example.com
    hostname: peer0.org1.example.com
    restart: unless-stopped
    depends_on:
      - orderer
      - couchdb
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=securebackup-fabric
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org1.example.com
      - CORE_PEER_ADDRESS=peer0.org1.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.example.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_EXTERNAL_BUILDER_PATH_0=/builders/external
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./network/crypto-config/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/msp:/etc/hyperledger/fabric/msp:ro
      - ./network/crypto-config/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls:/etc/hyperledger/fabric/tls:ro
      - ./network/crypto-config:/etc/hyperledger/crypto-config:ro
      - peer0-org1-data:/var/hyperledger/production
    ports:
      - "7051:7051"
    <<: *fabric-hosts
    networks:
      - securebackup

  # ── Chaincode (CCaaS) ───────────────────────────────────────────────────────
  chaincode:
    image: node:18-alpine
    container_name: backup-cc
    restart: unless-stopped
    depends_on:
      - peer
    working_dir: /usr/local/src
    command: sh start.sh
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9999
      - CHAINCODE_ID=${CHAINCODE_ID}
    volumes:
      - ./chaincode:/usr/local/src
    networks:
      - securebackup

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securebackup-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-securebackup}:${DB_PASSWORD}@db:5432/securebackup
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      MASTER_KEY: ${MASTER_KEY}
      FABRIC_WALLET_ABS_PATH: /securebackup/wallet
      FABRIC_CRYPTO_PATH: /securebackup/network/crypto-config
      FABRIC_PEER_HOST: peer0.org1.example.com
      FABRIC_ORDERER_HOST: orderer.org1.example.com
      FABRIC_CHANNEL: backupchannel
      FABRIC_CHAINCODE: backup-cc
      FABRIC_ORG_MSP: Org1MSP
      FABRIC_ADMIN_USER: admin
      IPFS_API_URL: http://ipfs:5001
      IPFS_GATEWAY_URL: http://ipfs:8080
      IPFS_CLUSTER_URL: http://ipfs-cluster:9094
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@securebackup.local}
    volumes:
      - ./network/crypto-config:/securebackup/network/crypto-config:ro
      - ./network/channel-artifacts:/securebackup/network/channel-artifacts:ro
      - ./network:/securebackup/network:ro
      - ./backend/config/initialized.json:/securebackup/backend/config/initialized.json
      - backend-wallet:/securebackup/wallet
      - backend-logs:/securebackup/logs
      - snapshots:/securebackup/snapshots
    networks:
      - securebackup
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Frontend (nginx) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securebackup-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - securebackup
